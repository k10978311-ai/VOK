name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libgl1 libglib2.0-0 \
            libdbus-1-3 libxkbcommon-x11-0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: |
          VERSION=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/^version\s*=\s*//' | tr -d '"' | tr -d "'" | xargs)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          QT_QPA_PLATFORM=offscreen uv run pyinstaller vok.spec --clean --noconfirm

      - name: Create tar archive
        run: |
          tar -czf "VOK-v${{ env.VERSION }}-Linux-x86_64.tar.gz" -C dist VOK

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VOK-v${{ env.VERSION }}-Linux-x86_64
          path: VOK-v${{ env.VERSION }}-Linux-x86_64.tar.gz

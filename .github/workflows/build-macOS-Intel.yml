name: Build macOS (arm64)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos-15-arm64:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          uv run pyinstaller vok.spec --clean --noconfirm
          codesign --force --deep --sign - dist/VOK.app 2>/dev/null || true

      - name: Create DMG
        run: |
          ln -s /Applications dist/Applications
          hdiutil create -srcfolder "dist/" -volname "VOK" -fs HFS+ \
              -fsargs "-c c=64,a=16,e=16" -format UDZO -size 400m \
              "VOK-v${VERSION}-macOS-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: VOK-v${{ steps.version.outputs.version }}-macOS-arm64
          path: VOK-v${{ steps.version.outputs.version }}-macOS-arm64.dmg


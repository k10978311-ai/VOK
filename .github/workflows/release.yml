# Release workflow: creates draft → builds (Windows/macOS/Linux) → uploads assets → publishes.
# To get build files (zip, DMG, installer) on a release, use a NEW tag and run this workflow
# (Actions → Release → Run workflow with e.g. v1.0.1). Do not publish the release manually first.
name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.draft == true)
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create draft release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
        run: |
          if gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null; then
            is_draft=$(gh release view "$TAG" --json isDraft -q .isDraft)
            if [ "$is_draft" = "false" ]; then
              echo "::error::Release $TAG is already published (immutable). Use a new tag (e.g. v1.0.1) or create a draft release manually for this tag."
              exit 1
            fi
            echo "Draft release for $TAG already exists, reusing it."
          else
            gh release create "$TAG" --draft --generate-notes
          fi

      - name: Set tag output
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: [prepare]
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path "pyproject.toml" -Pattern '^version\s*=\s*"(.*)"').Matches[0].Groups[1].Value
          Write-Host "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          uv run pyinstaller vok.spec --clean --noconfirm

      - name: Build installer
        id: installer
        shell: pwsh
        continue-on-error: true
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc "resources\installer\script_inno.iss" "/DMyAppVersion=${{ env.VERSION }}"
          } else {
            Write-Host "Inno Setup not found at $iscc, skipping installer"
            exit 1
          }

      - name: Create zip archive
        shell: pwsh
        run: |
          $zipFile = "VOK-v${{ env.VERSION }}-Windows-x86_64.zip"
          Compress-Archive -Path "dist\VOK\*" -DestinationPath $zipFile
          Write-Output "Created $zipFile"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          gh release upload $tag "VOK-v${{ env.VERSION }}-Windows-x86_64.zip" --clobber
          if (Test-Path "dist\VOK-v${{ env.VERSION }}-Windows-x86_64-Setup.exe") {
            gh release upload $tag "dist\VOK-v${{ env.VERSION }}-Windows-x86_64-Setup.exe" --clobber
          }

  build-macos:
    needs: [prepare]
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          uv run pyinstaller vok.spec --clean --noconfirm
          codesign --force --deep --sign - dist/VOK.app 2>/dev/null || true

      - name: Create DMG
        run: |
          ln -s /Applications dist/Applications

          attempt=0
          max_attempts=10
          while [ $attempt -lt $max_attempts ]; do
              hdiutil create -srcfolder "dist/" -volname "VOK" -fs HFS+ \
                  -fsargs "-c c=64,a=16,e=16" -format UDZO -size 400m \
                  "VOK-v${{ env.VERSION }}-macOS-arm64.dmg" && break

              attempt=$((attempt + 1))
              echo "Attempt $attempt failed, retrying..."
              sleep 1
          done

          if [ $attempt -eq $max_attempts ]; then
              echo "Failed to create DMG after $max_attempts attempts"
              exit 1
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" "VOK-v${{ env.VERSION }}-macOS-arm64.dmg" --clobber

  build-linux-x86_64:
    needs: [prepare]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libgl1 libglib2.0-0 \
            libdbus-1-3 libxkbcommon-x11-0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          QT_QPA_PLATFORM=offscreen uv run pyinstaller vok.spec --clean --noconfirm

      - name: Create zip archive
        run: |
          cd dist && zip -r "../VOK-v${{ env.VERSION }}-Linux-x86_64.zip" VOK

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" "VOK-v${{ env.VERSION }}-Linux-x86_64.zip" --clobber

  publish-release:
    needs: [prepare, build-windows, build-macos, build-linux-x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish release
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path "pyproject.toml" -Pattern '^version\s*=\s*"(.*)"').Matches[0].Groups[1].Value
          Write-Host "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          uv run pyinstaller vok.spec --clean --noconfirm

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "resources\installer\script_inno.iss" "/DMyAppVersion=${{ env.VERSION }}"

      - name: Create zip archive
        shell: pwsh
        run: |
          $zipFile = "VOK-v${{ env.VERSION }}-Windows-x86_64.zip"
          Compress-Archive -Path "dist\VOK\*" -DestinationPath $zipFile
          Write-Output "Created $zipFile"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VOK-v${{ env.VERSION }}-Windows-x86_64.zip
            dist/VOK-v${{ env.VERSION }}-Windows-x86_64-Setup.exe

  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          uv run pyinstaller vok.spec --clean --noconfirm
          codesign --force --deep --sign - dist/VOK.app 2>/dev/null || true

      - name: Create DMG
        run: |
          ln -s /Applications dist/Applications

          attempt=0
          max_attempts=10
          while [ $attempt -lt $max_attempts ]; do
              hdiutil create -srcfolder "dist/" -volname "VOK" -fs HFS+ \
                  -fsargs "-c c=64,a=16,e=16" -format UDZO -size 400m \
                  "VOK-v${{ env.VERSION }}-macOS-arm64.dmg" && break

              attempt=$((attempt + 1))
              echo "Attempt $attempt failed, retrying..."
              sleep 1
          done

          if [ $attempt -eq $max_attempts ]; then
              echo "Failed to create DMG after $max_attempts attempts"
              exit 1
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: VOK-v${{ env.VERSION }}-macOS-arm64.dmg

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libgl1 libglib2.0-0 \
            libdbus-1-3 libxkbcommon-x11-0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          QT_QPA_PLATFORM=offscreen uv run pyinstaller vok.spec --clean --noconfirm

      - name: Create zip archive
        run: |
          cd dist && zip -r "../VOK-v${{ env.VERSION }}-Linux-x86_64.zip" VOK

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: VOK-v${{ env.VERSION }}-Linux-x86_64.zip


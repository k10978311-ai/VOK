# LD YouTube Automator Pro - Default configuration
# Values are merged with AppData/settings.json at runtime

ldconsole_path: ""
ldplayer_install_dir: ""
appium_url: "http://127.0.0.1:4723"
adb_path: "adb"
youtube_package: "com.google.android.youtube"
proxies: []
proxy_mode: "per_instance"
default_resolution: "1080p"
default_fps: 60
color_correction:
  brightness: 1.0
  contrast: 1.0
  saturation: 1.0
  auto_balance: true
